services:
  - type: web
    name: soma
    env: python
    buildCommand: |
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs
      cd backend/whatsapp_service && npm install
      pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soma-db
          property: connectionString
      - key: SENDGRID_API_KEY
        sync: false

      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_SSL
        value: "true"
      - key: RENDER
        value: "true"
      - key: WA_SERVICE_HOST
        value: http://127.0.0.1:3001
      - key: VINCULAR_NUMERO
        value: "5219995314093"

databases:
  - name: soma-db
    plan: free
    databaseName: soma
    postgresMajorVersion: 16
