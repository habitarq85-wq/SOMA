services:
  - type: web
    name: soma
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --worker-class=gthread --threads=4
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soma-db
          property: connectionString
      - key: SENDGRID_API_KEY
        sync: false
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_TOKEN
        sync: false
      - key: NOTIFICACION_WHATSAPP
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_SSL
        value: "true"
      - key: RENDER
        value: "true"

databases:
  - name: soma-db
    plan: free
    databaseName: soma
    postgresMajorVersion: 16
