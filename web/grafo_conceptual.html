<script>
(function(){
  const S = ['PENDIENTE','EN_PROGRESO','LISTO','APROBADO'];
  const C = {PENDIENTE:'#555',EN_PROGRESO:'#ff9800',LISTO:'#4caf50',APROBADO:'#2196f3'};
  const svg = document.getElementById('grafo');
  const st = {};

  document.querySelectorAll('.node').forEach(n => {
    const s = n.dataset.step;
    st[s] = 'PENDIENTE';
    n.addEventListener('click', function(e) {
      e.stopPropagation();
      const k = this.dataset.step;
      const i = S.indexOf(st[k]);
      st[k] = S[(i + 1) % 4];
      const col = C[st[k]];
      this.querySelector('.node-stripe').setAttribute('fill', col);
      this.querySelector('.node-status-dot').setAttribute('fill', col);
      this.dataset.status = st[k];
      const isP = st[k] === 'PENDIENTE';
      const out = JSON.parse(this.dataset.outgoing || '[]');
      out.forEach(t => {
        svg.querySelectorAll(`.edge-path[data-from="${k}"]`).forEach(e => {
          e.style.opacity = isP ? '.5' : '1';
        });
      });
    });
    const out = JSON.parse(n.dataset.outgoing || '[]');
    out.forEach(t => {
      svg.querySelectorAll(`.edge-path[data-from="${s}"]`).forEach(e => {
        e.style.opacity = '0.5';
      });
    });
  });

  console.log('Grafo SOMA listo — ' + document.querySelectorAll('.node').length + ' nodos');
})();
</script>
